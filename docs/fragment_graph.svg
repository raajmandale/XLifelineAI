<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">

<style>
.node{fill:#22c55e}
.dead{fill:#ef4444}
text{fill:white;font-family:Arial;font-size:12px}
</style>

<circle class="node" cx="80" cy="150" r="15"></circle>
<circle class="node" cx="150" cy="80" r="15"></circle>
<circle class="dead" cx="150" cy="220" r="15"></circle>
<circle class="node" cx="250" cy="150" r="15"></circle>
