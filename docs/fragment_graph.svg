<circle class="dead" cx="350" cy="220" r="15"></circle>
<circle class="node" cx="450" cy="150" r="15"></circle>

<line x1="80" y1="150" x2="150" y2="80" stroke="white"></line>
<line x1="80" y1="150" x2="150" y2="220" stroke="white"></line>
<line x1="150" y1="80" x2="250" y2="150" stroke="white"></line>
<line x1="150" y1="220" x2="250" y2="150" stroke="white"></line>
<line x1="250" y1="150" x2="350" y2="80" stroke="white"></line>
<line x1="250" y1="150" x2="350" y2="220" stroke="white"></line>
<line x1="350" y1="80" x2="450" y2="150" stroke="white"></line>
<line x1="350" y1="220" x2="450" y2="150" stroke="white"></line>

</svg>